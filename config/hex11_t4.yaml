# hex11_t4.yaml — AlphaZero 11×11 Hex tuned for GCE n1-standard-4 + T4
# Target: strong, competent AI in ~10–15 hours (~$3–4 SPOT).
# Produces a model that understands bridges, ladders, blocking, and
# positional play — far beyond random, will beat casual players easily.

# ── Network ──────────────────────────────────────────────────────────────────
# 10×128 is the sweet spot for T4: fast inference, proven strong on 11×11.
trunk: resnet
num_res_blocks: 10
num_channels: 128

# ViT-only settings (ignored when trunk=resnet)
vit_heads: 8
vit_layers: 6
vit_ff_dim: 512
vit_dropout: 0.1

# ── MCTS ─────────────────────────────────────────────────────────────────────
num_simulations: 200       # fast enough for volume, strong enough to learn
c_puct: 1.4
dirichlet_alpha: 0.3
dirichlet_weight: 0.25
temperature_threshold: 30

# ── Self-play ─────────────────────────────────────────────────────────────────
num_workers: 4             # matches n1-standard-4 vCPUs
games_per_worker: 10       # 40 games/iter — quick iterations, steady data flow

# ── GPU Inference Server ─────────────────────────────────────────────────────
use_inference_server: true
inference_batch_size: 32   # smaller batches fill faster with 4 workers
inference_max_wait_ms: 5

# ── Training ─────────────────────────────────────────────────────────────────
num_iterations: 100        # enough for strong convergence at this scale
train_steps_per_iter: 100  # matches data volume per iteration
batch_size: 256            # smaller batch — fits data volume, stable gradients
lr_init: 0.001
weight_decay: 0.0001
min_buffer_size: 2500      # training starts on iteration 1 (~2800 positions)
buffer_size: 200000        # plenty for 100 iterations

# ── Arena ─────────────────────────────────────────────────────────────────────
arena_freq: 10
arena_games: 40
arena_simulations: 200
promotion_threshold: 0.55

# ── Checkpointing ────────────────────────────────────────────────────────────
checkpoint_freq: 25
model_dir: training/models
checkpoint_dir: training/checkpoints

# ── Metadata ─────────────────────────────────────────────────────────────────
level: az_t4
